name: CI Pipeline
 
# run on every push and pull request to main

on:

  push:

    branches: [ main ]

  pull_request:

    branches: [ main ]
 
jobs:

  lint-and-test:

    name: Lint and Test

    runs-on: ubuntu-latest
 
    # spin up a postgres service for tests

    services:

      postgres:

        image: postgres:15

        env:

          POSTGRES_USER: postgres

          POSTGRES_PASSWORD: postgres

          POSTGRES_DB: aiops_logs_test

        ports:

          - 5432:5432

        options: >-

          --health-cmd pg_isready

          --health-interval 10s

          --health-timeout 5s

          --health-retries 5
 
    steps:

      # step 1: checkout code

      - name: Checkout code

        uses: actions/checkout@v4
 
      # step 2: set up Python

      - name: Set up Python 3.11

        uses: actions/setup-python@v5

        with:

          python-version: "3.11"
 
      # step 3: cache pip dependencies (speeds up future runs)

      - name: Cache pip dependencies

        uses: actions/cache@v4

        with:

          path: ~/.cache/pip

          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
 
      # step 4: install dependencies

      - name: Install dependencies

        run: pip install -r requirements.txt
 
      # step 5: lint with ruff

      - name: Lint with ruff

        run: ruff check .
 
      # step 6: run tests

      - name: Run tests

        env:

          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/aiops_logs_test

          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

          ENVIRONMENT: testing

        run: pytest tests/ -v
 
  docker-build:

    name: Docker Build Check

    runs-on: ubuntu-latest

    needs: lint-and-test      # only runs if lint-and-test passes
 
    steps:

      - name: Checkout code

        uses: actions/checkout@v4
 
      - name: Build Docker image

        run: docker build -f docker/Dockerfile -t aiops-log-classification .
 